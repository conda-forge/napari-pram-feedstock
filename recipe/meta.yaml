{% set name = "napari-pram" %}
{% set version = "0.1.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/napari_pram-{{ version }}.tar.gz
  sha256: 27a4c1e2b386b91d641da7a1369d56184c71553fde442c2e8d9371f0890c7727

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - magicgui
    - napari
    - numpy
    - opencv
    - python >={{ python_min }}
    - qtpy
    - scikit-image
    - scipy

test:
  imports:
    - napari_pram
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/napari-pram/
  summary: plugin for PRAM data annotation and processing
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - goanpeca
    - jaimergp
